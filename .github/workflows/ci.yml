name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: MS-Cliente ──────────────────────────────────────────────────
  backend-ms-cliente:
    name: Backend — ms-cliente
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-cliente

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ms-cliente-test-results
          path: backend/ms-cliente/build/reports/tests/test/

  # ─── Backend: MS-Cuenta ───────────────────────────────────────────────────
  backend-ms-cuenta:
    name: Backend — ms-cuenta
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ms-cuenta

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ms-cuenta-test-results
          path: backend/ms-cuenta/build/reports/tests/test/

  # ─── Frontend: Next.js ────────────────────────────────────────────────────
  frontend:
    name: Frontend — Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3002

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
