version: '3.9'

services:
  # Base de Datos - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: banco-postgres
    environment:
      POSTGRES_DB: banco_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banco-network

  # Message Broker - RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: banco-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banco-network

  # Microservicio Cliente (puerto 8081)
  ms-cliente:
    build:
      context: ./backend/ms-cliente
      dockerfile: Dockerfile
    container_name: ms-cliente
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: ms-cliente
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banco_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_TABLE: flyway_schema_history_cliente
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/ 2>&1; exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - banco-network
    restart: unless-stopped

  # Microservicio Cuenta (puerto 8082)
  ms-cuenta:
    build:
      context: ./backend/ms-cuenta
      dockerfile: Dockerfile
    container_name: ms-cuenta
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: ms-cuenta
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/banco_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_TABLE: flyway_schema_history_cuenta
      # baseline-version "0" garantiza que V1 siempre se ejecute aunque el schema
      # ya tenga tablas de ms-cliente (persona, cliente) en la BD compartida.
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ms-cliente:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/ 2>&1; exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - banco-network
    restart: unless-stopped

  # Mock API Node.js de productos financieros (puerto 3002)
  mock-api:
    build:
      context: ./backend/mock-api
      dockerfile: Dockerfile
    container_name: banco-mock-api
    ports:
      - "3002:3002"
    networks:
      - banco-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3002/bp/products 2>&1; exit 0"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Frontend Next.js (puerto 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banco-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3002
    depends_on:
      - ms-cliente
      - ms-cuenta
      - mock-api
    networks:
      - banco-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  banco-network:
    driver: bridge