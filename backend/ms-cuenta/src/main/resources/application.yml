spring:
  application:
    name: ms-cuenta
  
  # Base de Datos
  datasource:
    url: jdbc:postgresql://localhost:5432/banco_db
    username: postgres
    password: password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  
  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
      hibernate.use_sql_comments: true
      hibernate.jdbc.batch_size: 20
  
  # Flyway Migraciones
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-version: 0 → el baseline es anterior a V1, así V1 siempre se ejecuta.
    # Sin esto, baseline-on-migrate ve las tablas de ms-cliente (persona, cliente)
    # y crea un baseline en V1, saltándose la creación de cuenta/movimiento.
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    # Tabla de historial propia para evitar conflicto con ms-cliente en la misma BD
    table: flyway_schema_history_cuenta
  
  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 10000
  
# Server
server:
  port: 8082
  servlet:
    context-path: /

# Logging
logging:
  level:
    root: INFO
    com.ms_cuenta: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management (Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
# Profile: Docker
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/banco_db
    username: postgres
    password: password
  
  rabbitmq:
    host: rabbitmq
    port: 5672

server:
  port: 8082

logging:
  level:
    root: WARN
    com.ms_cuenta: INFO