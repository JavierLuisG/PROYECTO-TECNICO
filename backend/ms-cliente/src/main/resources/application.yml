spring:
  application:
    name: ms-cliente
  
  # Base de Datos
  datasource:
    url: jdbc:postgresql://localhost:5432/banco_db
    username: postgres
    password: password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
  
  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
      hibernate.use_sql_comments: true
      hibernate.jdbc.batch_size: 20
  
  # Flyway Migraciones
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    # Tabla de historial propia para evitar conflicto con ms-cuenta en la misma BD
    table: flyway_schema_history_cliente
  
  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 10000
  
  # Spring Cloud Stream (RabbitMQ)
  cloud:
    stream:
      bindings:
        # Publisher: Eventos de cliente (futuro)
        cliente-creado-out-0:
          destination: cliente-creado-exchange
          content-type: application/json
        
        # Consumer: Escuchar movimientos (auditoría)
        movimiento-registrado-in-0:
          destination: movimiento-registrado-exchange
          group: ms-cliente-group
          content-type: application/json
      
      rabbit:
        bindings:
          cliente-creado-out-0:
            producer:
              routing-key-expression: "'cliente'"
          movimiento-registrado-in-0:
            consumer:
              queue-name-group-only: true

# Server
server:
  port: 8081
  servlet:
    context-path: /

# Logging
logging:
  level:
    root: INFO
    com.msclient: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Management (Actuator)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Microservices URLs
ms-cuenta:
  url: http://localhost:8082

---
# Profile: Docker
spring:
  config:
    activate:
      on-profile: docker
  
  datasource:
    url: jdbc:postgresql://postgres:5432/banco_db
    username: postgres
    password: password
  
  rabbitmq:
    host: rabbitmq
    port: 5672

server:
  port: 8081

logging:
  level:
    root: WARN
    com.ms_cliente: INFO

ms-cuenta:
  url: http://ms-cuenta:8082